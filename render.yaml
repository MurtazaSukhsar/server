services:
  # Node.js Hub Server
  - type: web
    name: rehab-hub
    env: node
    plan: free
    buildCommand: npm install
    startCommand: node server/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: BACKEND_URL
        value: http://localhost:5000 # Since they live in the same blueprint

  # Python Backend
  - type: web
    name: rehab-backend
    env: python
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: python backend/app.py
    envVars:
      - key: PORT
        value: 5000
